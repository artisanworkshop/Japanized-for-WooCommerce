# After pushing a new tag, this workflow will deploy the plugin to the WordPress.org plugin repository and create a new release on GitHub with the attached zip file.
# git push origin --tags
name: Deploy and Release Plugin
on:
    push:
        tags:
            - '*'
jobs:
    tag:
        name: New tag
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@master
            - name: Install SVN ( Subversion )
              run: |
                  sudo apt-get update
                  sudo apt-get install subversion
            - name: Remove PayPal gateway from SVN trunk
              env:
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
              run: |
                  SVN_URL="https://plugins.svn.wordpress.org/woocommerce-for-japan/trunk/includes/gateways/paypal"
                  if svn ls "$SVN_URL" \
                      --username "$SVN_USERNAME" --password "$SVN_PASSWORD" \
                      --no-auth-cache --non-interactive 2>/dev/null; then
                      echo "PayPal gateway found in SVN trunk. Removing..."
                      svn delete "$SVN_URL" \
                          -m "Remove PayPal gateway from plugin distribution" \
                          --username "$SVN_USERNAME" --password "$SVN_PASSWORD" \
                          --no-auth-cache --non-interactive
                      echo "PayPal gateway removed from SVN trunk."
                  else
                      echo "PayPal gateway not found in SVN trunk. Skipping."
                  fi
            - name: Remove nested .git directories from vendor packages
              run: find . -mindepth 2 -name '.git' -type d -exec rm -rf '{}' + 2>/dev/null || true
            - name: WordPress Plugin Deploy
              id: deploy
              uses: 10up/action-wordpress-plugin-deploy@stable
              with:
                  generate-zip: true
              env:
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: 'woocommerce-for-japan'
            - name: Create GitHub release
              uses: softprops/action-gh-release@v1
              with:
                  files: ${{github.workspace}}/${{ github.event.repository.name }}.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
